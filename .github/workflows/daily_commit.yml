name: Daily Commit
on:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 UTC
  workflow_dispatch: # Allows you to manually run the workflow from the Actions tab

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Make a minimal change
        run: |
          # Write the current date and time to a tracker file
          mkdir -p .github
          echo "Last daily commit run: $(date)" > .github/daily_commit_tracker.txt
          
          # Setup Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add and Commit
          git add .github/daily_commit_tracker.txt
          git commit -m "chore: automated daily commit to keep repo active" || echo "No changes to commit"
          
          # Push changes
          git push
