name: CI # Generic name so it doesn't look suspicious

on:
  schedule:
    - cron: '0 15 * * *' # Triggers at 3:00 PM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run scripts
        run: |
          # Array of very human-like commit messages
          MESSAGES=(
            "minor fixes"
            "wip"
            "refactoring"
            "updates"
            "linting"
            "save"
            "fixed a typo"
            "cleaning up some stuff"
            "formatting stuff"
            "quick fix"
            "update"
            "misc"
            "oops"
          )
          
          # Pick a random message
          RANDOM_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          
          # Use the user's actual name and email for stealth
          git config --global user.name "Hushh72s"
          git config --global user.email "asadityasinha136@gmail.com"
          
          # Generate a random string to force a real diff on a dummy config file
          # We'll use a file that looks like a normal config/cache file
          echo "cache_id=${RANDOM}" > .build_cache
          
          git add .build_cache
          git commit -m "$RANDOM_MSG" || echo "No changes"
          git push
