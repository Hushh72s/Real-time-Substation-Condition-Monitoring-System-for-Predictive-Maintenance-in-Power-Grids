name: CI

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run scripts
        run: |
          COUNT_FILE=".build_cache_id"
          
          # Read the current count
          if [ -f "$COUNT_FILE" ]; then
            COUNT=$(cat "$COUNT_FILE")
          else
            COUNT=0
          fi
          
          # If we have reached 8 commits, gracefully stop committing
          if [ "$COUNT" -ge 8 ]; then
             echo "We have reached our 8 days of automated commits. Going to sleep!"
             exit 0
          fi
          
          # Increment for today
          COUNT=$((COUNT + 1))
          echo "$COUNT" > "$COUNT_FILE"
          
          # Array of very human-like commit messages
          MESSAGES=(
            "minor fixes"
            "wip"
            "refactoring"
            "updates"
            "linting"
            "save"
            "fixed a typo"
            "cleaning up some stuff"
            "formatting stuff"
            "quick fix"
            "update"
            "misc"
            "oops"
          )
          
          RANDOM_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          
          git config --global user.name "Hushh72s"
          git config --global user.email "asadityasinha136@gmail.com"
          
          git add "$COUNT_FILE"
          git commit -m "$RANDOM_MSG" || echo "No changes"
          git push
